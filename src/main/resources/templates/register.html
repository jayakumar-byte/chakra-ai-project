<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chakra - Register</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: white;
        }
        .reg-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px; /* Register-ku konjam extra width for better feel */
            backdrop-filter: blur(10px);
            text-align: center;
        }
        h2 {
            color: #38bdf8;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 26px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #38bdf8;
            background: rgba(0,0,0,0.4);
        }
        input::placeholder { color: rgba(255,255,255,0.4); }

        button {
            width: 100%;
            padding: 14px;
            background: #22c55e; /* Green color for registration */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }

        /* Error Alert Styling */
        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        p {
            margin-top: 25px;
            font-size: 14px;
            color: #94a3b8;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        a:hover { opacity: 0.8; text-decoration: underline; }

        /* Mobile optimization */
        @media (max-width: 480px) {
            .reg-container {
                padding: 25px 20px;
            }
            h2 { font-size: 22px; }
            input, button { padding: 12px; }
        }
    </style>
</head>
<body>

<div class="reg-container">
    <h2>Create Account</h2>

    <div th:if="${errorMessage}" class="alert-error">
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <input type="text" th:field="*{name}" placeholder="Full Name" required>
        <input type="email" th:field="*{email}" placeholder="Email Address" required autocomplete="email">

        <input type="password" th:field="*{password}" placeholder="Password (Min. 8 characters)" required>

        <button type="submit">Register Now</button>
    </form>

    <p>
        Already have an account? <a th:href="@{/login}">Login</a>
    </p>
</div>

</body>
</html>
