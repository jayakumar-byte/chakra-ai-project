<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chakra - Register</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; }
        .reg-container { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 400px; }
        h2 { color: #fff; text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; box-sizing: border-box; background: rgba(0,0,0,0.2); color: white; }
        input::placeholder { color: rgba(255,255,255,0.5); }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #218838; }

        /* Error Alert Styling */
        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ef4444;
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight:600;
        }
    </style>
</head>
<body>

<div class="reg-container">
    <h2>Create Account</h2>

    <div th:if="${errorMessage}" class="alert-error">
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <input type="text" th:field="*{name}" placeholder="Full Name" required>
        <input type="email" th:field="*{email}" placeholder="Email Address" required>

        <input type="password" th:field="*{password}" placeholder="Password (Min. 8 characters)" required>

        <button type="submit">Register Now</button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #94a3b8;">
        Already have an account? <a th:href="@{/login}" style="color: #38bdf8; text-decoration: none;">Login</a>
    </p>
</div>

</body>
</html>
