<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vault History - Chakra AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .vault-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .vault-card:hover { transform: translateY(-5px); }
        .file-icon { font-size: 2rem; color: #1a237e; }
        .btn-action { border-radius: 10px; padding: 8px 15px; font-weight: 600; }
        .text-truncate { max-width: 100%; display: inline-block; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/api/chakra/dashboard}"><i class="fas fa-arrow-left me-2"></i> Back to Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="fas fa-vault me-2 text-primary"></i> Your Encrypted Vault</h2>
        <span class="badge bg-primary px-3 py-2" th:text="${files.size() + ' Files Secured'}"></span>
    </div>

    <div th:if="${param.message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${param.message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="file : ${files}">
            <div class="card vault-card p-3">
                <div class="d-flex align-items-center mb-3">
                    <i class="fas fa-file-shield file-icon me-3"></i>
                    <div class="overflow-hidden">
                        <h6 class="mb-0 text-truncate" th:text="${file.originalFileName}">filename.png</h6>
                        <small class="text-muted d-block" th:text="${file.fileType}">image/png</small>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <a th:href="@{/api/chakra/decrypt-hub(fileId=${file.id})}" class="btn btn-primary btn-action">
                        <i class="fas fa-unlock me-2"></i> Decrypt Now
                    </a>

                    <div class="d-flex gap-2">
                        <a th:href="@{/api/chakra/share-management}" class="btn btn-outline-info btn-action flex-grow-1">
                            <i class="fas fa-share-nodes"></i> Share
                        </a>

                        <form th:action="@{'/api/chakra/delete/' + ${file.id}}" method="POST"
                              onsubmit="return confirm('Macha, confirm-aa delete pannidalaama?')">
                            <button type="submit" class="btn btn-outline-danger btn-action">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(files)}">
            <i class="fas fa-folder-open fa-4x text-muted mb-3"></i>
            <h5>Your vault is empty, macha!</h5>
            <p class="text-muted">You haven't encrypted any files yet.</p>
            <a th:href="@{/api/chakra/encrypt-page}" class="btn btn-primary mt-2 text-white">
                <i class="fas fa-plus me-2"></i>Encrypt First File
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
