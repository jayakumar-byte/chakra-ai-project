<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chakra Encryption - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px; /* Mobile-la edge-la ottama irukka */
            box-sizing: border-box;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px; /* Padding konjam kuraichuruken for mobile */
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 100%; /* Full width edukkum */
            max-width: 380px; /* Aana 380px mela pogaadhu */
            text-align: center;
            color: white;
            backdrop-filter: blur(10px); /* Oru glassy look kudukkum */
        }
        h2 {
            color: #38bdf8;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 24px;
        }
        input {
            width: 100%;
            padding: 14px; /* Mobile touch-ku easy-aa irukka increase panniruken */
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px; /* Mobile-la auto-zoom avoid panna 16px best */
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #38bdf8;
            background: rgba(0,0,0,0.4);
        }
        input::placeholder { color: rgba(255,255,255,0.4); }

        button {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }

        /* Message Styling */
        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: left;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .success-msg {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        a:hover { opacity: 0.8; }

        /* Tablet/Mobile optimization */
        @media (max-width: 480px) {
            .login-container {
                padding: 25px 20px;
            }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Chakra Login</h2>

    <div th:if="${loginError}" class="error-msg" th:text="${loginError}"></div>
    <div th:if="${param.logout}" class="success-msg">You have been logged out.</div>
    <div th:if="${param.success}" class="success-msg">Registration Successful! Please Login.</div>

    <form th:action="@{/login}" method="post">
        <input type="email" name="username" placeholder="Email Address" required autocomplete="email">
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a th:href="@{/register}">Don't have an account? Register here</a>
</div>

</body>
</html>
